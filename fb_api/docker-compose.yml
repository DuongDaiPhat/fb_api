services:
# -- Ha tang Kafka --
    zookeeper:
        image: confluentinc/cp-zookeeper:7.6.1
        container_name: fb_api-zookeeper
        environment:
        ZOOKEEPER_CLIENT_PORT: 2181
        ZOOKEEPER_TICK_TIME: 2000
        ports:
            - "2181:2181"
    kafka:
        image: confluentinc/cp-kafka:7.6.1
        container_name: fb_api-kafka
        depends_on:
            - zookeeper
        ports:
            - "9092:9092"
        environment:
            KAFKA_BROKER_ID: 1
            KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
        # -- Kafka UI --
        kafka-ui:
            image: provectuslabs/kafka-ui:latest
            container_name: fb_api-kafka-ui
            depends_on:
                - kafka
            ports:
                - "8080:8080"
            environment:
                KAFKA_CLUSTERS_0_NAME: fb_api-local
                KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
                KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
        # -- Kafka Exporter (bridge Kafka -> Prometheus) --
        kafka-exporter:
            image: danielqsj/kafka-exporter:latest
            container_name: fb_api-kafka-exporter
            depends_on:
                - kafka
            ports:
                - "9308:9308"
            command:
                - "--kafka.server=kafka:9092"
        # -- Prometheus --
        prometheus:
            image: prom/prometheus:latest
            container_name: fb_api-prometheus
            depends_on:
                - kafka-exporter
            ports:
                - "9090:9090"
            volumes:
                - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
                - ./prometheus/alert.rules.yml:/etc/prometheus/alert.rules.yml
                - prometheus_data:/prometheus
            command:
                - "--config.file=/etc/prometheus/prometheus.yml"
                - "--storage.tsdb.path=/prometheus"
        # -- Alertmanager --
        alertmanager:
            image: prom/alertmanager:latest
            container_name: fb_api-alertmanager
            depends_on:
                - prometheus
            ports:
                - "9093:9093"
            volumes:
                - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
            command:
                - "--config.file=/etc/alertmanager/alertmanager.yml"
        # -- PostgreSQL --
        postgres:
            image: postgres:16
            container_name: fb_api-postgres
            environment:
                POSTGRES_DB: fb_api_db
                POSTGRES_USER: fb_api_user
                POSTGRES_PASSWORD: fb_api_password
            ports:
                - "5432:5432"
            volumes:
                - postgres_data:/var/lib/postgresql/data

        # -- Custom Services --
        webhook-service:
            build: ./services/webhook-service
            container_name: fb_api-webhook-service
            ports:
                - "3001:3001"
            depends_on:
                - kafka
            environment:
                - PORT=3001
                - KAFKA_BROKERS=kafka:9092
        
        core-service:
            build: ./services/core-service
            container_name: fb_api-core-service
            ports:
                - "3002:3002"
            depends_on:
                - kafka
            environment:
                - PORT=3002
                - KAFKA_BROKERS=kafka:9092  
        
        backend-api:
            build: ./services/backend-api
            container_name: fb_api-backend-api
            ports:
                - "3000:3000"
            depends_on:
                - postgres
                - kafka
            environment:
                - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/fb_api_db
                - SPRING_DATASOURCE_USERNAME=fb_api_user
                - SPRING_DATASOURCE_PASSWORD=fb_api_password
                - SPRING_KAFKA_BOOTSTRAP-SERVERS=kafka:9092
                - SERVER_PORT=3000
        
        retry-service:
            build: ./services/retry-service
            container_name: fb_api-retry-service
            ports:
                - "3003:3003"
            depends_on:
                - kafka
            environment:
                - SPRING_KAFKA_BOOTSTRAP-SERVERS=kafka:9092
                - SERVER_PORT=3003

volumes:
    postgres_data:
    prometheus_data: